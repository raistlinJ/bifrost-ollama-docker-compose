name: bifrost-ollama-proxy-win-selfsigned

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bifrost}
      POSTGRES_USER: ${POSTGRES_USER:-bifrost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-postgres-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bifrost} -d ${POSTGRES_DB:-bifrost}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  bifrost:
    image: maximhq/bifrost:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_STYLE: ${LOG_STYLE:-json}
      BIFROST_DB_TYPE: postgres
      BIFROST_DB_DSN: postgres://${POSTGRES_USER:-bifrost}:${POSTGRES_PASSWORD:-change-this-postgres-password}@postgres:5432/${POSTGRES_DB:-bifrost}?sslmode=disable
      # Docker Desktop normally resolves host.docker.internal, and the extra host keeps parity with Linux.
      OLLAMA_API_BASE: ${OLLAMA_API_BASE:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./bifrost:/app/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 20s

  certgen:
    image: alpine:3.21
    restart: "no"
    environment:
      SELF_SIGNED_CERT_CN: ${SELF_SIGNED_CERT_CN:-host.example.com}
      SELF_SIGNED_CERT_SAN: ${SELF_SIGNED_CERT_SAN:-DNS:host.example.com,DNS:localhost,IP:127.0.0.1}
      SELF_SIGNED_CERT_DAYS: ${SELF_SIGNED_CERT_DAYS:-825}
    command:
      - /bin/sh
      - -ec
      - |
        apk add --no-cache openssl
        mkdir -p /certs
        if [ -f /certs/server.crt ] && [ -f /certs/server.key ]; then
          echo "Self-signed certificate already exists; skipping generation."
          exit 0
        fi
        cat <<EOF >/tmp/openssl.cnf
        [req]
        default_bits = 4096
        prompt = no
        default_md = sha256
        x509_extensions = v3_req
        distinguished_name = dn

        [dn]
        CN = $${SELF_SIGNED_CERT_CN}

        [v3_req]
        subjectAltName = $${SELF_SIGNED_CERT_SAN}
        keyUsage = digitalSignature, keyEncipherment
        extendedKeyUsage = serverAuth
        EOF
        openssl req -x509 -nodes -newkey rsa:4096 \
          -days "$${SELF_SIGNED_CERT_DAYS}" \
          -keyout /certs/server.key \
          -out /certs/server.crt \
          -config /tmp/openssl.cnf
    volumes:
      - ./certs:/certs

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      bifrost:
        condition: service_healthy
      certgen:
        condition: service_completed_successfully
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/certs:ro
    networks:
      - backend

networks:
  backend:

volumes:
  postgres_data:
    name: bifrost-ollama-proxy-win-postgres-data